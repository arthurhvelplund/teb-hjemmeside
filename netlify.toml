# Netlify deployment config for TEB-hjemmesiden
# ----------------------------------------------------------------------
# Statisk site, ingen build-step. Netlify serverer alt under /site/
# direkte.
[build]
  publish = "site"

# Sikkerheds-headers (godt-at-have for et offentligt site)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache statiske assets længere, men data-filer kort så ændringer
# fra admin-panelet vises hurtigt.
[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=60, must-revalidate"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
