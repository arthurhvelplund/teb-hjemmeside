# Decap CMS – konfiguration for TEB-hjemmesiden
# ----------------------------------------------------------------------
# Dette panel viser et redigeringsbillede til personer uden teknisk
# baggrund. Alle ændringer commit'es til GitHub-repositoriet, hvorfra
# Netlify automatisk deployer til https://teb-tistrup.dk
#
# Backend: Git Gateway + Netlify Identity.
# Redaktører logger ind med email + password (fra invitation), og har
# IKKE brug for en GitHub-konto.
backend:
  name: git-gateway
  branch: main

# Hvor mediefiler (billeder) gemmes når man uploader via panelet:
media_folder: "site/images"
public_folder: "/images"

# "Editorial workflow" – ændringer går igennem en kladde/godkend-flow
# før de bliver live. Tag den fra hvis I vil publicere direkte.
publish_mode: editorial_workflow

# Vis siden på dansk
locale: 'da'

# ----------------------------------------------------------------------
# Collections – tre logiske grupper:
#   1. Indlæg     – nyhedsfeed
#   2. Foreningen – bestyrelse, repræsentanter, kontaktinfo
#   3. Forside    – indhold der vises på forsiden
# ----------------------------------------------------------------------
collections:

  # =================== 1. Indlæg ===================
  - name: "indlaeg"
    label: "Indlæg"
    label_singular: "Opslag"
    description: "Skriv et opslag der vises på forsiden under 'Seneste nyt' og på siden Nyt."
    files:
      - file: "site/data/indlaeg.json"
        name: "indlaeg"
        label: "Opslag"
        format: "json"
        fields:
          - label: "Opslag"
            name: "items"
            widget: "list"
            label_singular: "opslag"
            summary: "{{fields.date}} – {{fields.title}}"
            fields:
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Dato", name: "date", widget: "datetime", date_format: "DD.MM.YYYY", time_format: false, format: "YYYY-MM-DD", default: "" }
              - { label: "Forfatter", name: "author", widget: "string", required: false, hint: "Valgfrit. Fx 'Arthur Hvelplund'." }
              - { label: "Forsidebillede", name: "image", widget: "image", required: false, hint: "Valgfrit. Vises øverst i opslaget." }
              - { label: "Resumé", name: "summary", widget: "text", required: false, hint: "1-2 linjer der vises på forsiden." }
              - { label: "Tekst", name: "body", widget: "markdown", hint: "Selve opslaget. Du kan formatere med fed/kursiv, lister, links og billeder." }

  # =================== 2. Foreningen ===================
  # Bestyrelse, repræsentanter og kontaktinfo. Alle tre filer
  # vises på siden 'Om foreningen' og i footeren.
  - name: "foreningen"
    label: "Foreningen"
    description: "Bestyrelse, repræsentanter og kontaktinfo. Vises på 'Om foreningen' og i footeren."
    files:

      # ----- Bestyrelse -----
      - file: "site/data/bestyrelsen.json"
        name: "bestyrelsen"
        label: "Bestyrelse"
        format: "json"
        fields:
          - label: "Overskrift"
            name: "title"
            widget: "string"
            default: "Bestyrelsen 2026"
          - label: "Underoverskrift"
            name: "subtitle"
            widget: "string"
            default: "Syv mennesker, valgt af byen."
          - label: "Beskrivelse"
            name: "description"
            widget: "text"
          - label: "Bestyrelsesmedlemmer"
            name: "members"
            widget: "list"
            summary: "{{fields.role}}: {{fields.name}}"
            fields:
              - { label: "Rolle", name: "role", widget: "string", hint: "fx Formand, Kasserer, Bestyrelsesmedlem, Suppleant" }
              - { label: "Navn", name: "name", widget: "string" }
              - { label: "Adresse", name: "address", widget: "string", required: false }
              - { label: "Telefon", name: "phone", widget: "string", required: false, hint: "Skriv tlf. som det skal vises, fx '29 22 85 59'" }
              - { label: "Email", name: "email", widget: "string", required: false }
          - label: "Revisorer"
            name: "auditors"
            widget: "list"
            field: { label: "Navn", name: "name", widget: "string" }

      # ----- Repræsentanter -----
      - file: "site/data/repraesentanter.json"
        name: "repraesentanter"
        label: "Repræsentanter"
        format: "json"
        fields:
          - label: "Repræsentanter"
            name: "items"
            widget: "list"
            summary: "{{fields.body}}: {{fields.persons}}"
            fields:
              - { label: "Råd / udvalg", name: "body", widget: "string", hint: "fx HHST-Udvikling, Varde Handelsråd" }
              - { label: "Personer", name: "persons", widget: "string", hint: "fx 'Mette Bergstedt' eller 'Lars Lindblad (til 2027), Jens Bach Mortensen (til 2026)'" }

      # ----- Kontaktinfo -----
      - file: "site/data/kontakt.json"
        name: "kontakt"
        label: "Kontaktinfo"
        format: "json"
        fields:
          - { label: "Formandens navn", name: "formand_navn", widget: "string" }
          - { label: "Formandens adresse", name: "formand_adresse", widget: "string" }
          - { label: "Formandens telefon", name: "formand_tlf", widget: "string" }
          - { label: "Formandens e-mail", name: "formand_email", widget: "string" }
          - { label: "CVR", name: "cvr", widget: "string" }
          - { label: "Postnr. og by", name: "by", widget: "string", default: "6862 Tistrup, Danmark" }

  # =================== 3. Tal og fakta ===================
  # De tal der vises på forsiden. Klar til at vokse hvis vi senere
  # vil gøre flere fakta-felter redigerbare.
  - name: "tal"
    label: "Tal og fakta"
    description: "De tre tal der vises i hero-billedet på forsiden."
    files:
      - file: "site/data/forside.json"
        name: "forside_tal"
        label: "Forsidens tal"
        format: "json"
        fields:
          - { label: "Antal borgere", name: "borgere", widget: "string", default: "501" }
          - { label: "Antal virksomheder", name: "virksomheder", widget: "string", default: "46" }
          - { label: "Antal år i byens tjeneste", name: "aar", widget: "string", default: "122" }

# ----------------------------------------------------------------------
# NB: Vi har bevidst IKKE en collection til at redigere rå HTML-filer.
# Decap CMS understøtter ikke ren HTML-fil-redigering pålideligt
# (filerne har ikke det frontmatter Decap forventer). Hvis I skal
# ændre layout, struktur eller HTML på en side, så bed en udvikler
# om det.
